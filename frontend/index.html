<!DOCTYPE html>
<html lang="mn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="chat-container">
        <div class="chat-header">
          <div class="chat-title-group">
            <div class="room-badge">4-р баг</div>
            <h1>Chatly</h1>
            <p class="subtitle">
              Чат өрөөнд нэгдэж, бусадтай шууд холбогдоорой.
            </p>
          </div>
        </div>

        <div class="join-area">
          <div class="field-group">
            <label for="usernameInput">Таны нэр</label>
            <input
              type="text"
              id="usernameInput"
              placeholder="Нэрээ оруулна уу"
              autocomplete="off"
            />
          </div>
          <button id="joinButton">Нэгдэх</button>
        </div>

        <div id="messages" class="messages"></div>

        <div class="input-area">
          <div class="field-group">
            <label for="messageInput">Мессеж</label>
            <input
              type="text"
              id="messageInput"
              placeholder="Мессежээ бичнэ үү"
              autocomplete="off"
              disabled
            />
          </div>
          <button id="sendButton" disabled>Илгээх</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
